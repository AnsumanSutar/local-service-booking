version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/prisma:/app/prisma
      - ./server/uploads:/app/uploads
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - FRONTEND_URL=http://localhost:80
      - PORT=3001

  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
